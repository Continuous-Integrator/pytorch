# Matrix-driven binary build workflow for windows arm64 wheels.
name: windows-arm64-binary-wheel

on:
  push:
    branches:
      - nightly
    tags:
      - v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+
      - 'ciflow/binaries/*'
      - 'ciflow/binaries_libtorch/*'
      - 'ciflow/binaries_wheel/*'
  workflow_dispatch:

env:
  ALPINE_IMAGE: "308535385114.dkr.ecr.us-east-1.amazonaws.com/tool/alpine"
  AWS_DEFAULT_REGION: us-east-1
  BUILD_ENVIRONMENT: windows-arm64-binary-wheel
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  PR_NUMBER: ${{ github.event.pull_request.number }}
  SHA1: ${{ github.event.pull_request.head.sha || github.sha }}
  SKIP_ALL_TESTS: 1
  OS: windows-arm64
  PYTORCH_ROOT: /pytorch
  DOWNLOADS_DIR: c:\temp\downloads
  DEPENDENCIES_DIR: c:\temp\dependencies
  ENABLE_APL: 1
  ENABLE_OPENBLAS: 0
  MSVC_VERSION : 14.42
concurrency:
  group: windows-arm64-binary-wheel-${{ github.event.pull_request.number || github.ref_name }}-${{ github.ref_type == 'branch' && github.sha }}-${{ github.event_name == 'workflow_dispatch' }}
  cancel-in-progress: true

jobs:
  get-label-type:
    if: github.repository_owner == 'pytorch'
    name: get-label-type
    uses: pytorch/pytorch/.github/workflows/_runner-determinator.yml@main
    with:
      triggering_actor: ${{ github.triggering_actor }}
      issue_owner: ${{ github.event.pull_request.user.login || github.event.issue.user.login }}
      curr_branch: ${{ github.head_ref || github.ref_name }}
      curr_ref_type: ${{ github.ref_type }}

  generate-matrix:
    if: github.repository_owner == 'pytorch'
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.generate.outputs.configs }}
      libtorch-configs: ${{ steps.generate.outputs.libtorch-configs }}
    steps:
      - name: Checkout PyTorch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          submodules: false
          show-progress: false
      - name: Generate matrix
        id: generate
        run: python3 .github/scripts/generate_binary_build_matrix.py --runtime-matrix windows-arm64

  wheel-build:
    name: ${{ matrix.config.build_name }}-build
    if: ${{ github.repository_owner == 'pytorch' }}
    needs: [get-label-type, generate-matrix]
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.generate-matrix.outputs.configs) }}
    uses: ./.github/workflows/_binary-build-windows-arm64.yml
    with:
      PACKAGE_TYPE: wheel
      DESIRED_CUDA: ${{ matrix.config.desired_cuda }}
      GPU_ARCH_TYPE: ${{ matrix.config.gpu_arch_type }}
      DESIRED_PYTHON: ${{ matrix.config.python_version }}
      build_name: ${{ matrix.config.build_name }}
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

  wheel-test:
    name: ${{ matrix.config.build_name }}-test
    if: ${{ github.repository_owner == 'pytorch' }}
    needs: [get-label-type, generate-matrix, wheel-build]
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.generate-matrix.outputs.configs) }}
    uses: ./.github/workflows/_binary-test-windows-arm64.yml
    with:
      PACKAGE_TYPE: wheel
      DESIRED_CUDA: ${{ matrix.config.desired_cuda }}
      GPU_ARCH_TYPE: ${{ matrix.config.gpu_arch_type }}
      DESIRED_PYTHON: ${{ matrix.config.python_version }}
      build_name: ${{ matrix.config.build_name }}
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

  wheel-upload:
    name: ${{ matrix.config.build_name }}-upload
    if: ${{ github.repository_owner == 'pytorch' }}
    permissions:
      id-token: write
      contents: read
    needs: [generate-matrix, wheel-test]
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.generate-matrix.outputs.configs) }}
    with:
      PYTORCH_ROOT: ${{ github.workspace }}
      PACKAGE_TYPE: wheel
      DESIRED_CUDA: ${{ matrix.config.desired_cuda }}
      GPU_ARCH_TYPE: ${{ matrix.config.gpu_arch_type }}
      DESIRED_PYTHON: ${{ matrix.config.python_version }}
      build_name: ${{ matrix.config.build_name }}
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    uses: ./.github/workflows/_binary-upload.yml

  libtorch-extract:
    name: ${{ matrix.libtorch.build_name }}-extract
    if: ${{ github.repository_owner == 'pytorch' }}
    needs: [get-label-type, generate-matrix, wheel-build]
    runs-on: "${{ needs.get-label-type.outputs.label-type }}linux.4xlarge"
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        libtorch: ${{ fromJSON(needs.generate-matrix.outputs.libtorch-configs) }}
    env:
      DESIRED_CUDA: ${{ matrix.libtorch.desired_cuda }}
      LIBTORCH_VARIANT: ${{ matrix.libtorch.libtorch_variant }}
    steps:
      - name: Checkout PyTorch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          sparse-checkout: .ci/libtorch/
          show-progress: false
      - uses: actions/download-artifact@v4.1.7
        name: Download Wheel Artifact
        with:
          name: ${{ matrix.libtorch.source_wheel_build_name }}
          path: "${{ runner.temp }}/wheel_artifact/"
      - name: Extract libtorch from wheel
        shell: bash
        run: |
          set -eux
          mkdir -p "${{ runner.temp }}/libtorch_output"
          python3 .ci/libtorch/extract_libtorch_from_wheel.py \
            --wheel-dir "${{ runner.temp }}/wheel_artifact" \
            --output-dir "${{ runner.temp }}/libtorch_output" \
            --platform windows \
            --desired-cuda "$DESIRED_CUDA" \
            --libtorch-variant "$LIBTORCH_VARIANT"
      - uses: actions/upload-artifact@v4.4.0
        if: always()
        with:
          name: ${{ matrix.libtorch.build_name }}
          retention-days: 14
          if-no-files-found: error
          path: "${{ runner.temp }}/libtorch_output/"

  libtorch-upload:
    name: ${{ matrix.libtorch.build_name }}-upload
    if: ${{ github.repository_owner == 'pytorch' }}
    permissions:
      id-token: write
      contents: read
    needs: [generate-matrix, libtorch-extract]
    strategy:
      fail-fast: false
      matrix:
        libtorch: ${{ fromJSON(needs.generate-matrix.outputs.libtorch-configs) }}
    with:
      PYTORCH_ROOT: ${{ github.workspace }}
      PACKAGE_TYPE: libtorch
      DESIRED_CUDA: ${{ matrix.libtorch.desired_cuda }}
      GPU_ARCH_TYPE: ${{ matrix.libtorch.gpu_arch_type }}
      LIBTORCH_CONFIG: ${{ matrix.libtorch.libtorch_config }}
      LIBTORCH_VARIANT: ${{ matrix.libtorch.libtorch_variant }}
      build_name: ${{ matrix.libtorch.build_name }}
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    uses: ./.github/workflows/_binary-upload.yml
