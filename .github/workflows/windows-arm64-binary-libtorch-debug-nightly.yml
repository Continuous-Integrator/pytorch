# Matrix-driven binary build workflow for windows arm64 libtorch debug.
name: windows-arm64-binary-libtorch-debug

on:
  push:
    branches:
      - nightly
    tags:
      - v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+
      - 'ciflow/binaries/*'
      - 'ciflow/binaries_libtorch/*'
  workflow_dispatch:

env:
  ALPINE_IMAGE: "308535385114.dkr.ecr.us-east-1.amazonaws.com/tool/alpine"
  AWS_DEFAULT_REGION: us-east-1
  BUILD_ENVIRONMENT: windows-arm64-binary-libtorch-debug
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  PR_NUMBER: ${{ github.event.pull_request.number }}
  SHA1: ${{ github.event.pull_request.head.sha || github.sha }}
  SKIP_ALL_TESTS: 1
  OS: windows-arm64
  PYTORCH_ROOT: /pytorch
  DOWNLOADS_DIR: c:\temp\downloads
  DEPENDENCIES_DIR: c:\temp\dependencies
  ENABLE_APL: 1
  ENABLE_OPENBLAS: 0
  MSVC_VERSION : 14.42
concurrency:
  group: windows-arm64-binary-libtorch-debug-${{ github.event.pull_request.number || github.ref_name }}-${{ github.ref_type == 'branch' && github.sha }}-${{ github.event_name == 'workflow_dispatch' }}
  cancel-in-progress: true

jobs:
  get-label-type:
    if: github.repository_owner == 'pytorch'
    name: get-label-type
    uses: pytorch/pytorch/.github/workflows/_runner-determinator.yml@main
    with:
      triggering_actor: ${{ github.triggering_actor }}
      issue_owner: ${{ github.event.pull_request.user.login || github.event.issue.user.login }}
      curr_branch: ${{ github.head_ref || github.ref_name }}
      curr_ref_type: ${{ github.ref_type }}

  generate-matrix:
    if: github.repository_owner == 'pytorch'
    runs-on: ubuntu-latest
    outputs:
      libtorch-debug-configs: ${{ steps.generate.outputs.libtorch-debug-configs }}
    steps:
      - name: Checkout PyTorch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          submodules: false
          show-progress: false
      - name: Generate matrix
        id: generate
        run: python3 .github/scripts/generate_binary_build_matrix.py --runtime-matrix windows-arm64

  libtorch-build:
    name: ${{ matrix.config.build_name }}-build
    if: ${{ github.repository_owner == 'pytorch' }}
    needs: [get-label-type, generate-matrix]
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.generate-matrix.outputs.libtorch-debug-configs) }}
    uses: ./.github/workflows/_binary-build-windows-arm64.yml
    with:
      PACKAGE_TYPE: libtorch
      DESIRED_CUDA: ${{ matrix.config.desired_cuda }}
      GPU_ARCH_TYPE: ${{ matrix.config.gpu_arch_type }}
      LIBTORCH_CONFIG: ${{ matrix.config.libtorch_config }}
      LIBTORCH_VARIANT: ${{ matrix.config.libtorch_variant }}
      # Dummy value so our batch scripts install pip correctly for libtorch builds.
      DESIRED_PYTHON: "3.10"
      build_name: ${{ matrix.config.build_name }}
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

  libtorch-test:
    name: ${{ matrix.config.build_name }}-test
    if: ${{ github.repository_owner == 'pytorch' }}
    needs: [get-label-type, generate-matrix, libtorch-build]
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.generate-matrix.outputs.libtorch-debug-configs) }}
    uses: ./.github/workflows/_binary-test-windows-arm64.yml
    with:
      PACKAGE_TYPE: libtorch
      DESIRED_CUDA: ${{ matrix.config.desired_cuda }}
      GPU_ARCH_TYPE: ${{ matrix.config.gpu_arch_type }}
      LIBTORCH_CONFIG: ${{ matrix.config.libtorch_config }}
      LIBTORCH_VARIANT: ${{ matrix.config.libtorch_variant }}
      DESIRED_PYTHON: "3.10"
      build_name: ${{ matrix.config.build_name }}
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

  libtorch-upload:
    name: ${{ matrix.config.build_name }}-upload
    if: ${{ github.repository_owner == 'pytorch' }}
    permissions:
      id-token: write
      contents: read
    needs: [generate-matrix, libtorch-test]
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.generate-matrix.outputs.libtorch-debug-configs) }}
    with:
      PYTORCH_ROOT: ${{ github.workspace }}
      PACKAGE_TYPE: libtorch
      DESIRED_CUDA: ${{ matrix.config.desired_cuda }}
      GPU_ARCH_TYPE: ${{ matrix.config.gpu_arch_type }}
      LIBTORCH_CONFIG: ${{ matrix.config.libtorch_config }}
      LIBTORCH_VARIANT: ${{ matrix.config.libtorch_variant }}
      build_name: ${{ matrix.config.build_name }}
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    uses: ./.github/workflows/_binary-upload.yml
