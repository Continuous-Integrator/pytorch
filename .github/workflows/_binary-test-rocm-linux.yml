name: linux-binary-test-rocm

on:
  workflow_call:
    inputs:
      build_name:
        required: true
        type: string
        description: The build's name (matches the downloaded artifact name)
      PYTORCH_ROOT:
        required: true
        type: string
        description: Root directory for the pytorch/pytorch repository
      PACKAGE_TYPE:
        required: true
        type: string
        description: Package type
      DESIRED_CUDA:
        required: true
        type: string
        description: Desired CUDA / ROCm identifier (e.g. rocm7.1)
      GPU_ARCH_VERSION:
        required: true
        type: string
        description: ROCm version (e.g. 7.1)
      GPU_ARCH_TYPE:
        required: true
        type: string
        description: GPU arch type (always "rocm" here)
      DOCKER_IMAGE:
        required: true
        type: string
        description: Base docker image name
      DOCKER_IMAGE_TAG_PREFIX:
        required: true
        type: string
        description: Docker image tag prefix (e.g. rocm7.1)
      DESIRED_PYTHON:
        required: false
        type: string
        description: Desired python version
      runs_on:
        required: false
        type: string
        default: linux.rocm.gpu.gfx942.1
        description: ROCm runner label
      timeout-minutes:
        required: false
        type: number
        default: 240

permissions:
  id-token: write

jobs:
  test:
    runs-on: ${{ inputs.runs_on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    env:
      PYTORCH_ROOT: ${{ inputs.PYTORCH_ROOT }}
      PACKAGE_TYPE: ${{ inputs.PACKAGE_TYPE }}
      # TODO: This is a legacy variable that we eventually want to get rid of in
      #       favor of GPU_ARCH_VERSION
      DESIRED_CUDA: ${{ inputs.DESIRED_CUDA }}
      GPU_ARCH_VERSION: ${{ inputs.GPU_ARCH_VERSION }}
      GPU_ARCH_TYPE: ${{ inputs.GPU_ARCH_TYPE }}
      SKIP_ALL_TESTS: 1
      DOCKER_IMAGE: ${{ inputs.DOCKER_IMAGE }}
      DOCKER_IMAGE_TAG_PREFIX: ${{ inputs.DOCKER_IMAGE_TAG_PREFIX }}
      DESIRED_PYTHON: ${{ inputs.DESIRED_PYTHON }}
      # The following were set at the caller workflow's top-level env: in the
      # legacy (non-reusable) flow. A reusable workflow doesn't inherit caller
      # env, so redeclare the ones the docker/test scripts read.
      ALPINE_IMAGE: "308535385114.dkr.ecr.us-east-1.amazonaws.com/tool/alpine"
      AWS_DEFAULT_REGION: us-east-1
      BINARY_ENV_FILE: /tmp/env
      BUILD_ENVIRONMENT: linux-binary-manywheel
      PYTORCH_FINAL_PACKAGE_DIR: /artifacts
      SHA1: ${{ github.event.pull_request.head.sha || github.sha }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout PyTorch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          submodules: recursive
          show-progress: false
      - name: Clean PyTorch checkout
        run: |
          # Remove any artifacts from the previous checkouts
          git clean -fxd
      - name: Setup ROCm
        uses: ./.github/actions/setup-rocm
      - uses: actions/download-artifact@v4.1.7
        name: Download Build Artifacts
        with:
          name: ${{ inputs.build_name }}
          path: "${{ runner.temp }}/artifacts/"
      - name: ROCm set GPU_FLAG
        run: |
          echo "GPU_FLAG=--device=/dev/mem --device=/dev/kfd --device=/dev/dri --group-add video --group-add daemon" >> "${GITHUB_ENV}"
      - name: configure aws credentials
        id: aws_creds
        if: ${{ startsWith(github.event.ref, 'refs/tags/ciflow/') }}
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: arn:aws:iam::308535385114:role/gha_workflow_s3_and_ecr_read_only
          aws-region: us-east-1
          role-duration-seconds: 18000
      - name: Calculate docker image
        id: calculate-docker-image
        uses: pytorch/test-infra/.github/actions/calculate-docker-image@main
        with:
          docker-registry: ${{ startsWith(github.event.ref, 'refs/tags/ciflow/') && '308535385114.dkr.ecr.us-east-1.amazonaws.com' || 'docker.io' }}
          docker-image-name: ${{ inputs.DOCKER_IMAGE }}
          custom-tag-prefix: ${{ inputs.DOCKER_IMAGE_TAG_PREFIX }}
          docker-build-dir: .ci/docker
      - name: Pull Docker image
        uses: pytorch/test-infra/.github/actions/pull-docker-image@main
        with:
          docker-image: ${{ steps.calculate-docker-image.outputs.docker-image }}
      - name: Test Pytorch binary
        uses: ./.github/actions/test-pytorch-binary
        env:
          DOCKER_IMAGE: ${{ steps.calculate-docker-image.outputs.docker-image }}
      - name: Teardown ROCm
        uses: ./.github/actions/teardown-rocm
