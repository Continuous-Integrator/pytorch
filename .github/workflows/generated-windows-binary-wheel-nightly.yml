# @generated DO NOT EDIT MANUALLY
#
# Matrix-driven binary build workflow for windows x86_64 wheels. The list
# of python / arch combinations is produced at runtime by
# .github/scripts/generate_binary_build_matrix.py --runtime-matrix windows
# so adding a new python/CUDA version there is picked up on the next run
# without regenerating this YAML.
name: windows-binary-wheel

on:
  push:
    # NOTE: Meta Employees can trigger new nightlies using: https://fburl.com/trigger_pytorch_nightly_build
    branches:
      - nightly
    tags:
      # NOTE: Binary build pipelines should only get triggered on release candidate builds
      # Release candidate tags look like: v1.11.0-rc1
      - v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+
      - 'ciflow/binaries/*'
      - 'ciflow/binaries_libtorch/*'
      - 'ciflow/binaries_wheel/*'
  workflow_dispatch:

env:
  # Needed for conda builds
  ALPINE_IMAGE: "308535385114.dkr.ecr.us-east-1.amazonaws.com/tool/alpine"
  AWS_DEFAULT_REGION: us-east-1
  BUILD_ENVIRONMENT: windows-binary-wheel
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  PR_NUMBER: ${{ github.event.pull_request.number }}
  SHA1: ${{ github.event.pull_request.head.sha || github.sha }}
  SKIP_ALL_TESTS: 1
  OS: windows
concurrency:
  group: windows-binary-wheel-${{ github.event.pull_request.number || github.ref_name }}-${{ github.ref_type == 'branch' && github.sha }}-${{ github.event_name == 'workflow_dispatch' }}
  cancel-in-progress: true

jobs:
  get-label-type:
    if: github.repository_owner == 'pytorch'
    name: get-label-type
    uses: pytorch/pytorch/.github/workflows/_runner-determinator.yml@main
    with:
      triggering_actor: ${{ github.triggering_actor }}
      issue_owner: ${{ github.event.pull_request.user.login || github.event.issue.user.login }}
      curr_branch: ${{ github.head_ref || github.ref_name }}
      curr_ref_type: ${{ github.ref_type }}

  generate-matrix:
    if: github.repository_owner == 'pytorch'
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.generate.outputs.configs }}
    steps:
      - name: Checkout PyTorch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          submodules: false
          show-progress: false
      - name: Generate matrix
        id: generate
        run: python3 .github/scripts/generate_binary_build_matrix.py --runtime-matrix windows

  wheel-build:
    name: ${{ matrix.config.build_name }}-build
    if: ${{ github.repository_owner == 'pytorch' }}
    needs: [get-label-type, generate-matrix]
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.generate-matrix.outputs.configs) }}
    uses: ./.github/workflows/_binary-build-windows.yml
    with:
      PACKAGE_TYPE: wheel
      DESIRED_CUDA: ${{ matrix.config.desired_cuda }}
      GPU_ARCH_VERSION: ${{ matrix.config.gpu_arch_version }}
      GPU_ARCH_TYPE: ${{ matrix.config.gpu_arch_type }}
      DESIRED_PYTHON: ${{ matrix.config.python_version }}
      PYTORCH_EXTRA_INSTALL_REQUIREMENTS: ${{ matrix.config.pytorch_extra_install_requirements }}
      runner_prefix: ${{ needs.get-label-type.outputs.label-type }}
      runs_on: windows.12xlarge
      build_name: ${{ matrix.config.build_name }}
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

  wheel-test:
    name: ${{ matrix.config.build_name }}-test
    if: ${{ github.repository_owner == 'pytorch' }}
    needs: [get-label-type, generate-matrix, wheel-build]
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.generate-matrix.outputs.configs) }}
    uses: ./.github/workflows/_binary-test-windows.yml
    with:
      PACKAGE_TYPE: wheel
      DESIRED_CUDA: ${{ matrix.config.desired_cuda }}
      GPU_ARCH_VERSION: ${{ matrix.config.gpu_arch_version }}
      GPU_ARCH_TYPE: ${{ matrix.config.gpu_arch_type }}
      DESIRED_PYTHON: ${{ matrix.config.python_version }}
      runner_prefix: ${{ needs.get-label-type.outputs.label-type }}
      runs_on: ${{ matrix.config.gpu_arch_type == 'cuda' && 'windows.g4dn.xlarge' || 'windows.4xlarge' }}
      build_name: ${{ matrix.config.build_name }}
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

  wheel-upload:
    name: ${{ matrix.config.build_name }}-upload
    if: ${{ github.repository_owner == 'pytorch' }}
    permissions:
      id-token: write
      contents: read
    needs: [generate-matrix, wheel-test]
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.generate-matrix.outputs.configs) }}
    with:
      PYTORCH_ROOT: ${{ github.workspace }}
      PACKAGE_TYPE: wheel
      DESIRED_CUDA: ${{ matrix.config.desired_cuda }}
      GPU_ARCH_VERSION: ${{ matrix.config.gpu_arch_version }}
      GPU_ARCH_TYPE: ${{ matrix.config.gpu_arch_type }}
      DESIRED_PYTHON: ${{ matrix.config.python_version }}
      build_name: ${{ matrix.config.build_name }}
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    uses: ./.github/workflows/_binary-upload.yml
