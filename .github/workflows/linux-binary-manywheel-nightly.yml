# Matrix-driven binary build workflow for linux x86_64 manywheel.
# The list of python / arch combinations is produced at runtime by
# .github/scripts/generate_binary_build_matrix.py --runtime-matrix linux
# so adding a new python/CUDA/ROCm version in that script is picked up on
# the next workflow run without regenerating this YAML.
name: linux-binary-manywheel


on:
  push:
    # NOTE: Meta Employees can trigger new nightlies using: https://fburl.com/trigger_pytorch_nightly_build
    branches:
      - nightly
    tags:
      # NOTE: Binary build pipelines should only get triggered on release candidate builds
      # Release candidate tags look like: v1.11.0-rc1
      - v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+
      - 'ciflow/binaries/*'
      - 'ciflow/binaries_libtorch/*'
      - 'ciflow/binaries_wheel/*'
  workflow_dispatch:

permissions:
  id-token: write

env:
  # Needed for conda builds
  ALPINE_IMAGE: "308535385114.dkr.ecr.us-east-1.amazonaws.com/tool/alpine"
  AWS_DEFAULT_REGION: us-east-1
  BINARY_ENV_FILE: /tmp/env
  BUILD_ENVIRONMENT: linux-binary-manywheel
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  PR_NUMBER: ${{ github.event.pull_request.number }}
  PYTORCH_FINAL_PACKAGE_DIR: /artifacts
  PYTORCH_ROOT: /pytorch
  SHA1: ${{ github.event.pull_request.head.sha || github.sha }}
  SKIP_ALL_TESTS: 0
concurrency:
  group: linux-binary-manywheel-${{ github.event.pull_request.number || github.ref_name }}-${{ github.ref_type == 'branch' && github.sha }}-${{ github.event_name == 'workflow_dispatch' }}
  cancel-in-progress: true

jobs:
  get-label-type:
    if: github.repository_owner == 'pytorch'
    name: get-label-type
    uses: pytorch/pytorch/.github/workflows/_runner-determinator.yml@main
    with:
      triggering_actor: ${{ github.triggering_actor }}
      issue_owner: ${{ github.event.pull_request.user.login || github.event.issue.user.login }}
      curr_branch: ${{ github.head_ref || github.ref_name }}
      curr_ref_type: ${{ github.ref_type }}

  generate-matrix:
    if: github.repository_owner == 'pytorch'
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.generate.outputs.configs }}
      test-standard-configs: ${{ steps.generate.outputs.test-standard-configs }}
      test-rocm-configs: ${{ steps.generate.outputs.test-rocm-configs }}
      test-xpu-configs: ${{ steps.generate.outputs.test-xpu-configs }}
    steps:
      - name: Checkout PyTorch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          submodules: false
          show-progress: false
      - name: Generate matrix
        id: generate
        run: python3 .github/scripts/generate_binary_build_matrix.py --runtime-matrix linux

  build:
    name: ${{ matrix.config.build_name }}-build
    if: ${{ github.repository_owner == 'pytorch' }}
    needs: [get-label-type, generate-matrix]
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.generate-matrix.outputs.configs) }}
    uses: ./.github/workflows/_binary-build-linux.yml
    with:
      PYTORCH_ROOT: /pytorch
      PACKAGE_TYPE: manywheel
      # TODO: This is a legacy variable that we eventually want to get rid of in
      #       favor of GPU_ARCH_VERSION
      DESIRED_CUDA: ${{ matrix.config.desired_cuda }}
      GPU_ARCH_VERSION: ${{ matrix.config.gpu_arch_version }}
      GPU_ARCH_TYPE: ${{ matrix.config.gpu_arch_type }}
      DOCKER_IMAGE: ${{ matrix.config.container_image }}
      DOCKER_IMAGE_TAG_PREFIX: ${{ matrix.config.container_image_tag_prefix }}
      DESIRED_PYTHON: ${{ matrix.config.python_version }}
      runner_prefix: ${{ needs.get-label-type.outputs.label-type }}
      PYTORCH_EXTRA_INSTALL_REQUIREMENTS: ${{ matrix.config.pytorch_extra_install_requirements }}
      timeout-minutes: ${{ matrix.config.gpu_arch_type == 'rocm' && 420 || 240 }}
      build_name: ${{ matrix.config.build_name }}
      build_environment: linux-binary-manywheel
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

  # CPU and CUDA tests (standard path, uses _binary-test-linux.yml)
  test:
    name: ${{ matrix.config.build_name }}-test
    if: ${{ github.repository_owner == 'pytorch' }}
    needs: [get-label-type, generate-matrix, build]
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.generate-matrix.outputs.test-standard-configs) }}
    uses: ./.github/workflows/_binary-test-linux.yml
    with:
      PYTORCH_ROOT: /pytorch
      PACKAGE_TYPE: manywheel
      # TODO: This is a legacy variable that we eventually want to get rid of in
      #       favor of GPU_ARCH_VERSION
      DESIRED_CUDA: ${{ matrix.config.desired_cuda }}
      GPU_ARCH_VERSION: ${{ matrix.config.gpu_arch_version }}
      GPU_ARCH_TYPE: ${{ matrix.config.gpu_arch_type }}
      DOCKER_IMAGE: ${{ matrix.config.container_image }}
      DOCKER_IMAGE_TAG_PREFIX: ${{ matrix.config.container_image_tag_prefix }}
      DESIRED_PYTHON: ${{ matrix.config.python_version }}
      build_name: ${{ matrix.config.build_name }}
      build_environment: linux-binary-manywheel
      runner_prefix: ${{ needs.get-label-type.outputs.label-type }}
      runs_on: ${{ matrix.config.gpu_arch_type == 'cpu' && 'linux.4xlarge' || 'linux.g4dn.4xlarge.nvidia.gpu' }}
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

  # ROCm test: delegates to _binary-test-rocm-linux.yml (setup-rocm +
  # GPU_FLAG + ECR docker pull + teardown-rocm).
  test-rocm:
    name: ${{ matrix.config.build_name }}-test
    if: ${{ github.repository_owner == 'pytorch' && needs.generate-matrix.outputs.test-rocm-configs != '[]' }}
    needs: [generate-matrix, build]
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.generate-matrix.outputs.test-rocm-configs) }}
    uses: ./.github/workflows/_binary-test-rocm-linux.yml
    with:
      PYTORCH_ROOT: /pytorch
      PACKAGE_TYPE: manywheel
      DESIRED_CUDA: ${{ matrix.config.desired_cuda }}
      GPU_ARCH_VERSION: ${{ matrix.config.gpu_arch_version }}
      GPU_ARCH_TYPE: ${{ matrix.config.gpu_arch_type }}
      DOCKER_IMAGE: ${{ matrix.config.container_image }}
      DOCKER_IMAGE_TAG_PREFIX: ${{ matrix.config.container_image_tag_prefix }}
      DESIRED_PYTHON: ${{ matrix.config.python_version }}
      build_name: ${{ matrix.config.build_name }}

  # XPU test: delegates to _binary-test-xpu-linux.yml (setup-xpu + ECR
  # docker pull + teardown-xpu).
  test-xpu:
    name: ${{ matrix.config.build_name }}-test
    if: ${{ github.repository_owner == 'pytorch' && needs.generate-matrix.outputs.test-xpu-configs != '[]' }}
    needs: [generate-matrix, build]
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.generate-matrix.outputs.test-xpu-configs) }}
    uses: ./.github/workflows/_binary-test-xpu-linux.yml
    with:
      PYTORCH_ROOT: /pytorch
      PACKAGE_TYPE: manywheel
      DESIRED_CUDA: ${{ matrix.config.desired_cuda }}
      GPU_ARCH_TYPE: ${{ matrix.config.gpu_arch_type }}
      DOCKER_IMAGE: ${{ matrix.config.container_image }}
      DOCKER_IMAGE_TAG_PREFIX: ${{ matrix.config.container_image_tag_prefix }}
      DESIRED_PYTHON: ${{ matrix.config.python_version }}
      build_name: ${{ matrix.config.build_name }}

  # Upload depends on whichever test job covers this config. We list all
  # three test jobs in `needs` and rely on the matrix cell that doesn't
  # match simply being satisfied (needs are per-job, not per-cell; we
  # guard with `!failure() && !cancelled()` to tolerate an entire test
  # family being skipped on an OS where it has no cells).
  upload:
    name: ${{ matrix.config.build_name }}-upload
    if: |
      !failure() && !cancelled()
      && github.repository_owner == 'pytorch'
    permissions:
      id-token: write
      contents: read
    needs: [generate-matrix, test, test-rocm, test-xpu]
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.generate-matrix.outputs.configs) }}
    with:
      PYTORCH_ROOT: /pytorch
      PACKAGE_TYPE: manywheel
      # TODO: This is a legacy variable that we eventually want to get rid of in
      #       favor of GPU_ARCH_VERSION
      DESIRED_CUDA: ${{ matrix.config.desired_cuda }}
      GPU_ARCH_VERSION: ${{ matrix.config.gpu_arch_version }}
      GPU_ARCH_TYPE: ${{ matrix.config.gpu_arch_type }}
      DOCKER_IMAGE: ${{ matrix.config.container_image }}
      DOCKER_IMAGE_TAG_PREFIX: ${{ matrix.config.container_image_tag_prefix }}
      DESIRED_PYTHON: ${{ matrix.config.python_version }}
      build_name: ${{ matrix.config.build_name }}
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    uses: ./.github/workflows/_binary-upload.yml
