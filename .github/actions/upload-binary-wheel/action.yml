name: Upload binary wheel
description: |
  Push an already-built/delocated wheel (present under ${PKG_DIR}) to S3 and,
  for nightlies, Cloudflare R2. This wraps the same binary_upload.sh script
  the Linux reusable workflow (_binary-upload.yml) uses, so the two paths
  stay in sync. The caller must set `permissions: id-token: write` at the
  job level for OIDC to the AWS role.

inputs:
  build-name:
    required: true
    description: Build name, e.g. wheel-py3_10-cpu — used by binary_upload.sh.
  package-type:
    required: true
    description: "wheel or libtorch"
  desired-cuda:
    required: true
    description: "cpu, cu126, etc. Becomes the S3 subfolder."
  pkg-dir:
    required: true
    description: Directory containing the wheel(s) to upload.
  r2-account-id:
    required: false
    description: Cloudflare R2 account ID (nightlies only).
    default: ""
  r2-access-key-id:
    required: false
    default: ""
  r2-secret-access-key:
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Configure AWS credentials (nightly)
      if: ${{ github.event_name == 'push' && github.event.ref == 'refs/heads/nightly' }}
      uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
      with:
        role-to-assume: arn:aws:iam::749337293305:role/gha_workflow_nightly_build_wheels
        aws-region: us-east-1
    - name: Configure AWS credentials (RC)
      if: ${{ github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/') && !startsWith(github.event.ref, 'refs/tags/ciflow/') }}
      uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
      with:
        role-to-assume: arn:aws:iam::749337293305:role/gha_workflow_test_build_wheels
        aws-region: us-east-1
    - name: Set DRY_RUN (nightly or RC tag)
      if: ${{ github.event_name == 'push' && (github.event.ref == 'refs/heads/nightly' || (startsWith(github.event.ref, 'refs/tags/') && !startsWith(github.event.ref, 'refs/tags/ciflow/'))) }}
      shell: bash
      run: echo "DRY_RUN=disabled" >> "${GITHUB_ENV}"
    - name: Set UPLOAD_CHANNEL (RC tag)
      if: ${{ github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/') && !startsWith(github.event.ref, 'refs/tags/ciflow/') }}
      shell: bash
      run: |
        if [[ "${GITHUB_REF_NAME}" = *-rc[0-9]* ]]; then
          echo "UPLOAD_CHANNEL=test" >> "${GITHUB_ENV}"
        fi
    - name: Install sha256sum on macOS if missing
      if: ${{ runner.os == 'macOS' }}
      shell: bash
      run: command -v sha256sum >/dev/null || brew install coreutils
    - name: Upload wheel to S3/R2
      shell: bash
      env:
        PACKAGE_TYPE: ${{ inputs.package-type }}
        DESIRED_CUDA: ${{ inputs.desired-cuda }}
        BUILD_NAME: ${{ inputs.build-name }}
        PKG_DIR: ${{ inputs.pkg-dir }}
        UPLOAD_SUBFOLDER: ${{ inputs.desired-cuda }}
        R2_UPLOAD: ${{ (github.event_name == 'push' && github.event.ref == 'refs/heads/nightly') && 'true' || '' }}
        R2_ACCOUNT_ID: ${{ inputs.r2-account-id }}
        R2_ACCESS_KEY_ID: ${{ inputs.r2-access-key-id }}
        R2_SECRET_ACCESS_KEY: ${{ inputs.r2-secret-access-key }}
      run: |
        set -ex
        bash .ci/pytorch/binary_upload.sh
